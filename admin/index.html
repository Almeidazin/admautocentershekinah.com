<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Shekinah Auto Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
        }

        .admin-header {
            background: #1a1a1a;
            border-bottom: 2px solid #ffd700;
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title h1 {
            color: #ffd700;
            font-size: 1.5rem;
        }

        .header-title p {
            color: #b6b6b6;
            font-size: 0.85rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        .view-site {
            background: #ffd700;
            color: #0a0a0a;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .view-site:hover {
            background: #ccac00;
        }

        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 250px;
            height: calc(100vh - 70px);
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 2rem 0;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            color: #b6b6b6;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border-left-color: #ffd700;
        }

        .sidebar-menu i {
            width: 20px;
        }

        .admin-content {
            margin-left: 250px;
            margin-top: 70px;
            padding: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h3 {
            color: #b6b6b6;
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .stat-info .stat-number {
            color: #ffd700;
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-icon {
            font-size: 2.5rem;
            color: #ffd700;
            opacity: 0.5;
        }

        .admin-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }

        .section-header h2 {
            color: #ffd700;
            font-size: 1.3rem;
        }

        .btn-primary {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: #ccac00;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: #ffd700;
            border-bottom: 2px solid #ffd700;
            font-weight: 600;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #333;
            color: #b6b6b6;
        }

        tr:hover td {
            background: rgba(255, 215, 0, 0.05);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: #ff4444;
            color: white;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #ffd700;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .categories-list {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .category-tag {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-tag button {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1rem;
        }

        .category-tag button:hover {
            color: #ff0000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }

        .modal-header h2 {
            color: #ffd700;
        }

        .modal-close {
            background: none;
            border: none;
            color: #b6b6b6;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #ff4444;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                display: none;
            }
            .admin-content {
                margin-left: 0;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="header-title">
            <h1>Shekinah Auto Center</h1>
            <p>Painel Administrativo</p>
        </div>
        <div class="header-actions">
            <a href="https://autocentershekinah.com" class="view-site" target="_blank">
                <i class="fas fa-external-link-alt"></i> Ver Site
            </a>
            <button class="btn-logout" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </header>

    <aside class="admin-sidebar">
        <ul class="sidebar-menu">
            <li><a href="#dashboard" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="#products"><i class="fas fa-box"></i> Produtos</a></li>
            <li><a href="#categories"><i class="fas fa-tags"></i> Categorias</a></li>
        </ul>
    </aside>

    <main class="admin-content">
        <div id="alert" class="alert"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total de Produtos</h3>
                    <span class="stat-number" id="totalProducts">0</span>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-box"></i>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Categorias</h3>
                    <span class="stat-number" id="totalCategories">0</span>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-tags"></i>
                </div>
            </div>
        </div>

        <div class="admin-section" id="products">
            <div class="section-header">
                <h2><i class="fas fa-box"></i> Gerenciar Produtos</h2>
                <button class="btn-primary" id="btnAddProduct">
                    <i class="fas fa-plus"></i> Novo Produto
                </button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Tags</th>
                            <th>SKU</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 2rem;">
                                <i class="fas fa-spinner fa-spin"></i> Carregando...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="admin-section" id="categories" style="display: none;">
            <div class="section-header">
                <h2><i class="fas fa-tags"></i> Gerenciar Categorias</h2>
                <button class="btn-primary" id="btnAddCategory">
                    <i class="fas fa-plus"></i> Nova Categoria
                </button>
            </div>

            <div class="form-group">
                <label for="newCategory">Nova Categoria</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="newCategory" placeholder="Ex: Pneus Esportivos" style="flex: 2;">
                    <button class="btn-primary" id="saveCategoryBtn" style="flex: 0.5;">Adicionar</button>
                </div>
            </div>

            <div class="categories-list" id="categoriesList">
                <p style="color: #b6b6b6;">Carregando categorias...</p>
            </div>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Adicionar Produto</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>

            <form id="productForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="pCategory">Categoria *</label>
                        <select id="pCategory" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pPrice">Preço (R$) *</label>
                        <input type="number" step="0.01" id="pPrice" placeholder="279.90" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pTitle">Título do Produto *</label>
                    <input type="text" id="pTitle" placeholder="Ex: 175/70 R14 • Linha Econômica" required>
                </div>

                <div class="form-group">
                    <label for="pDesc">Descrição</label>
                    <textarea id="pDesc" placeholder="Descrição detalhada do produto"></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="pTag1">Tag 1</label>
                        <input type="text" id="pTag1" placeholder="⭐ 4,7">
                    </div>
                    <div class="form-group">
                        <label for="pTag2">Tag 2</label>
                        <input type="text" id="pTag2" placeholder="Baixo ruído">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="pTag3">Tag 3</label>
                        <input type="text" id="pTag3" placeholder="Molhado: bom">
                    </div>
                    <div class="form-group">
                        <label for="pSku">SKU</label>
                        <input type="text" id="pSku" placeholder="PNEU-1757014">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelModal">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        if (!sessionStorage.getItem('admin_logged')) {
            window.location.href = 'login.html';
        }

        const API_URL = "https://shekinah-api-nova.vercel.app/api";
        const ADMIN_PASSWORD = "shekinah2026";

        let categories = [];
        let products = [];
        let editingId = null;

        const showAlert = (message, type = 'success') => {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        };

        const loadCategories = async () => {
            try {
                const res = await axios.get(`${API_URL}/categorias`);
                categories = res.data;
                renderCategories();
                updateCategorySelect();
                updateStats();
            } catch (error) {
                showAlert('Erro ao carregar categorias', 'error');
            }
        };

        const renderCategories = () => {
            const list = document.getElementById('categoriesList');
            if (!categories.length) {
                list.innerHTML = '<p style="color: #b6b6b6;">Nenhuma categoria</p>';
                return;
            }
            list.innerHTML = categories.map(c => 
                `<div class="category-tag">${c.nome} <button onclick="deleteCategory('${c.id}')"><i class="fas fa-times"></i></button></div>`
            ).join('');
        };

        window.deleteCategory = async (id) => {
            if (!confirm('Excluir categoria?')) return;
            try {
                await axios.delete(`${API_URL}/categorias`, { data: { senha: ADMIN_PASSWORD, id } });
                await loadCategories();
                await loadProducts();
                showAlert('Categoria excluída');
            } catch (error) {
                showAlert('Erro ao excluir', 'error');
            }
        };

        const updateCategorySelect = () => {
            const select = document.getElementById('pCategory');
            select.innerHTML = categories.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        };

        const loadProducts = async () => {
            try {
                const res = await axios.get(`${API_URL}/produtos`);
                products = res.data;
                renderProducts();
                updateStats();
            } catch (error) {
                showAlert('Erro ao carregar produtos', 'error');
            }
        };

        const renderProducts = () => {
            const tbody = document.getElementById('productsTableBody');
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum produto</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><strong>${p.title}</strong><br><small>${p.description?.substring(0,50)}...</small></td>
                    <td>${p.category}</td>
                    <td>R$ ${Number(p.price).toFixed(2)}</td>
                    <td>${(p.tags || []).join(', ')}</td>
                    <td>${p.sku || '—'}</td>
                    <td class="action-buttons">
                        <button class="btn-edit" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        };

        window.editProduct = (id) => {
            const p = products.find(p => p.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Editar Produto';
            document.getElementById('pCategory').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pTitle').value = p.title;
            document.getElementById('pDesc').value = p.description || '';
            document.getElementById('pTag1').value = p.tags?.[0] || '';
            document.getElementById('pTag2').value = p.tags?.[1] || '';
            document.getElementById('pTag3').value = p.tags?.[2] || '';
            document.getElementById('pSku').value = p.sku || '';
            document.getElementById('productModal').classList.add('active');
        };

        window.deleteProduct = async (id) => {
            if (!confirm('Excluir produto?')) return;
            try {
                await axios.delete(`${API_URL}/produtos`, { data: { senha: ADMIN_PASSWORD, id } });
                await loadProducts();
                showAlert('Produto excluído');
            } catch (error) {
                showAlert('Erro ao excluir', 'error');
            }
        };

        const updateStats = () => {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('totalCategories').textContent = categories.length;
        };

        document.getElementById('btnAddProduct').addEventListener('click', () => {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Adicionar Produto';
            document.getElementById('productForm').reset();
            if (categories.length) document.getElementById('pCategory').value = categories[0].nome;
            document.getElementById('productModal').classList.add('active');
        });

        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('productModal').classList.remove('active');
        });

        document.getElementById('cancelModal').addEventListener('click', () => {
            document.getElementById('productModal').classList.remove('active');
        });

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const productData = {
                category: document.getElementById('pCategory').value,
                title: document.getElementById('pTitle').value.trim(),
                description: document.getElementById('pDesc').value.trim(),
                price: parseFloat(document.getElementById('pPrice').value),
                tags: [document.getElementById('pTag1').value.trim(), document.getElementById('pTag2').value.trim(), document.getElementById('pTag3').value.trim()].filter(Boolean),
                sku: document.getElementById('pSku').value.trim()
            };

            try {
                if (editingId) {
                    await axios.put(`${API_URL}/produtos`, { senha: ADMIN_PASSWORD, id: editingId, ...productData });
                    showAlert('Produto atualizado');
                } else {
                    await axios.post(`${API_URL}/produtos`, { senha: ADMIN_PASSWORD, ...productData });
                    showAlert('Produto adicionado');
                }
                document.getElementById('productModal').classList.remove('active');
                await loadProducts();
            } catch (error) {
                showAlert('Erro ao salvar', 'error');
            }
        });

        document.getElementById('btnAddCategory').addEventListener('click', () => {
            document.getElementById('newCategory').focus();
        });

        document.getElementById('saveCategoryBtn').addEventListener('click', async () => {
            const nome = document.getElementById('newCategory').value.trim();
            if (!nome) return showAlert('Digite um nome', 'error');
            try {
                await axios.post(`${API_URL}/categorias`, { senha: ADMIN_PASSWORD, nome });
                document.getElementById('newCategory').value = '';
                await loadCategories();
                showAlert('Categoria adicionada');
            } catch (error) {
                showAlert('Erro ao adicionar', 'error');
            }
        });

        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.sidebar-menu a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const target = link.getAttribute('href').substring(1);
                document.getElementById('products').style.display = target === 'products' ? 'block' : 'none';
                document.getElementById('categories').style.display = target === 'categories' ? 'block' : 'none';
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('admin_logged');
            window.location.href = 'login.html';
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await loadCategories();
            await loadProducts();
        });
    </script>
</body>
</html>
